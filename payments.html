 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tutoring Payments</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .locked {
      opacity: 0.5;
      pointer-events: none;
    }
    .hidden {
      display: none;
    }
    .notice {
      max-width: 900px;
      margin: 20px auto;
      padding: 15px;
      background: #f4f4f4;
      border-left: 4px solid #555;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Online Math Tutoring with Tom Quinn</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="why-online-tutoring-works.html">Why Online Tutoring</a>
      <a href="sales.html">The Process</a>
      <a href="services.html">Courses</a>
      <a href="contact.html">Contact</a>
      <a href="payments.html">Payments and Scheduling</a>
      <a href="student-successs-stories.html">Success stories</a>
      <a href="parent-faq.html">FAQ</a>
    </nav>
    <h2>Secure Tutoring Payment and Scheduling</h2>
  </header>

  <div class="paycontainer">
<form action="https://www.paypal.com/cgi-bin/webscr" method="post">
  <input type="hidden" name="cmd" value="_xclick" />
  <input type="hidden" name="business" value="mathtutor-tomquinn@gmail.com" />
  <input type="hidden" name="item_name" id="item_name_hidden" value="1 Half Hour TEST Session" />
  <input type="hidden" name="item_number" value="TUTOR001" />
  <input type="hidden" name="amount" id="paypalAmount" value="1.00" />
  <input type="hidden" name="currency_code" value="USD" />
  <input type="hidden" name="no_note" value="1" />
  <input type="hidden" name="bn" value="PP-BuyNowBF" />

  <input type="hidden" name="return" value="https://mathtutortomquinn.github.io/MathTutor/payment-success.html" />
  <input type="hidden" name="cancel_return" value="https://mathtutortomquinn.github.io/MathTutor/payment-cancelled.html" />

  <select id="item_select">
    <option value="1 Half Hour TEST Session" data-price="1.00">1 Half Hour TEST Session — $1.00</option>
    <option value="2 Half Hour Sessions" data-price="75.00">2 Half Hour Sessions — $75.00</option>
    <option value="10 Half Hour Sessions" data-price="350.00">10 Half Hour Sessions — $350.00</option>
    <option value="20 Half Hour Sessions" data-price="650.00">20 Half Hour Sessions — $650.00</option>
  </select>

  <input type="text" id="displayAmount" value="$1.00" readonly />
  <button type="submit" id="payBtn">Pay $1.00</button>
</form>
  </div>

  <div id="bookingNotice" class="notice">
    Please purchase a tutoring package, then the scheduling calendar will be presented.
  </div>

  <section id="bookingSection" class="locked hidden" style="max-width:900px;margin:auto;">
    <h2>Book a Session</h2>
    <div
      class="calendly-inline-widget"
      data-url="https://calendly.com/mathtutor-tomquinn/30min"
      style="min-width:320px;height:750px;">
    </div>
  </section>

  <script>
const select = document.getElementById('item_select');
const paypalAmount = document.getElementById('paypalAmount');
const displayAmount = document.getElementById('displayAmount');
const payBtn = document.getElementById('payBtn');
const itemNameHidden = document.getElementById('item_name_hidden');

function updatePayment() {
  const selectedOption = select.options[select.selectedIndex];
  const price = selectedOption.dataset.price;
  const name = selectedOption.value;

  paypalAmount.value = price;
  itemNameHidden.value = name;
  displayAmount.value = `$${price}`;
  payBtn.textContent = `Pay $${price}`;
}

updatePayment();
select.addEventListener('change', updatePayment);

    document.querySelector('form').addEventListener('submit', function () {
      payBtn.textContent = 'Processing...';
      payBtn.disabled = true;
    });
  </script>
</body>
</html>
