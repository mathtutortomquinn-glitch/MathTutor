  <style>
    .locked {
      opacity: 0.5;
      pointer-events: none;
    }

    .hidden {
      display: none;
    }

    .notice {
      max-width: 900px;
      margin: 20px auto;
      padding: 15px;
      background: #f4f4f4;
      border-left: 4px solid #555;
      font-size: 1rem;
    }
  </style>
</head>

<body>
<header>
<h1>Online Math Tutoring with Tom Quinn</h1>

<nav>

  <h2>Payment-Cancelled</h2>
</header>


  <div class="paycontainer">
    <form action="https://www.paypal.com/cgi-bin/webscr" method="post">
      <input type="hidden" name="cmd" value="_xclick">
      <input type="hidden" name="business" value="mathtutor-tomquinn@gmail.com">
      <input type="hidden" name="currency_code" value="USD">

      <!-- PayPal return URLs -->
      <input type="hidden" name="return" value="https://calendly.com/mathtutor-tomquinn/30min?paid=true">
      <input type="hidden" name="cancel_return" value="https://calendly.com/mathtutor-tomquinn/30min?paid=false">

 <!--  <label for="item_name">Choose a tutoring package:</label> -->

      <h2>Choose a tutoring package:</h2>
      
      <select class="item_name" id="item_name" name="item_name">
        <option value="1 Half Hour TEST Sessions" data-price="1.00">1 Half Hour TEST Sessions — $1</option>
        <option value="2 Half Hour Sessions" data-price="75.00">2 Half Hour Sessions — $75</option>
        <option value="10 Half Hour Sessions" data-price="350.00">10 Half Hour Sessions — $350</option>
        <option value="20 Half Hour Sessions" data-price="650.00">20 Half Hour Sessions — $650</option>
      </select>

      <input type="hidden" name="amount" id="paypalAmount" value="75.00">
      <input class="pay_text_box" type="text" id="displayAmount" value="$75.00" readonly>

      <button class="payBtn" id="payBtn" type="submit">  Pay $75.00  </button>
    </form>
  </div>
 
  <div id="bookingNotice" class="notice">
    Please purchase a tutoring package then scheduling calendar will be presented.
  </div>

  <section id="bookingSection" class="locked hidden" style="max-width:900px;margin:auto;">
    <h2>Book a Session</h2>

    <div
      class="calendly-inline-widget"
      data-url="https://calendly.com/mathtutor-tomquinn/30min"
      style="min-width:320px;height:750px;">
    </div>
  </section>

  <script>
    const select = document.querySelector('.item_name');
    const paypalAmount = document.getElementById('paypalAmount');
    const displayAmount = document.getElementById('displayAmount');
    const payBtn = document.getElementById('payBtn');
    const bookingSection = document.getElementById('bookingSection');
    const bookingNotice = document.getElementById('bookingNotice');

    function updatePayment() {
      const selectedOption = select.options[select.selectedIndex];
      const price = selectedOption.dataset.price;

      paypalAmount.value = price;
      displayAmount.value = `$${price}`;
      payBtn.textContent = `Pay $${price}`;
      payBtn.disabled = false;
    }

    function checkPaymentStatus() {
      const params = new URLSearchParams(window.location.search);
      const paid = params.get('paid');

      if (paid === 'true') {
        bookingSection.classList.remove('hidden', 'locked');
        bookingNotice.classList.add('hidden');

        // Load Calendly only after payment
        const calendlyScript = document.createElement('script');
        calendlyScript.src = 'https://assets.calendly.com/assets/external/widget.js';
        calendlyScript.async = true;
        document.body.appendChild(calendlyScript);
      } else {
        bookingSection.classList.add('hidden', 'locked');
        bookingNotice.classList.remove('hidden');
      }
    }

    updatePayment();
    checkPaymentStatus();

    select.addEventListener('change', updatePayment);

    const form = document.querySelector('form');

    form.addEventListener('submit', function() {
      payBtn.textContent = "Processing...";
      payBtn.disabled = true;
    });

  </script>

</body>
</html>
